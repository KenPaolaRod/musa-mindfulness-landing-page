<script type="text/babel" data-presets="env,react">
const { useEffect, useRef, useState } = React;

  videoBrightness: 80,
  videoYOffset: 17,

// Lucide-as-React icon helper. Renders the SVG produced by the lucide UMD into a span.
function Icon({ name, size = 24, className = "", strokeWidth = 1.75, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide || !window.lucide.icons) return;
    const node = ref.current;
    node.innerHTML = "";
    const iconData = window.lucide.icons[name];
    if (!iconData) return;
    const svg = window.lucide.createElement(iconData);
    svg.setAttribute("width", size);
    svg.setAttribute("height", size);
    svg.setAttribute("stroke-width", strokeWidth);
    node.appendChild(svg);
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} {...rest} />;
}

function Hero() {
  const t = HERO_CONTENT;
  const videoRef = useRef(null);
  const rafRef = useRef(null);
  const fadingOutRef = useRef(false);
  const [email, setEmail] = useState("");
  const [submitted, setSubmitted] = useState(false);

  // Custom JS fade system — see spec.
  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;

    const FADE_MS = 500;
    const TAIL_S = 0.55;

    const cancelRaf = () => {
      if (rafRef.current != null) {
        cancelAnimationFrame(rafRef.current);
        rafRef.current = null;
      }
    };

    const fade = (target) => {
      cancelRaf();
      const start = performance.now();
      const from = parseFloat(video.style.opacity || "0");
      const tick = (now) => {
        const t = Math.min(1, (now - start) / FADE_MS);
        const v = from + (target - from) * t;
        video.style.opacity = String(v);
        if (t < 1) {
          rafRef.current = requestAnimationFrame(tick);
        } else {
          rafRef.current = null;
        }
      };
      rafRef.current = requestAnimationFrame(tick);
    };

    const onLoaded = () => {
      video.style.opacity = "0";
      fadingOutRef.current = false;
      const p = video.play();
      if (p && p.catch) p.catch(() => {});
      fade(1);
    };

    const onTimeUpdate = () => {
      if (fadingOutRef.current) return;
      const remaining = (video.duration || 0) - video.currentTime;
      if (remaining > 0 && remaining <= TAIL_S) {
        fadingOutRef.current = true;
        fade(0);
      }
    };

    const onEnded = () => {
      cancelRaf();
      video.style.opacity = "0";
      setTimeout(() => {
        try {
          video.currentTime = 0;
          const p = video.play();
          if (p && p.catch) p.catch(() => {});
        } catch (_) {}
        fadingOutRef.current = false;
        fade(1);
      }, 100);
    };

    video.style.opacity = "0";
    video.addEventListener("loadeddata", onLoaded);
    video.addEventListener("timeupdate", onTimeUpdate);
    video.addEventListener("ended", onEnded);

    // If the video is already ready, kick off immediately.
    if (video.readyState >= 2) onLoaded();

    return () => {
      cancelRaf();
      video.removeEventListener("loadeddata", onLoaded);
      video.removeEventListener("timeupdate", onTimeUpdate);
      video.removeEventListener("ended", onEnded);
    };
  }, []);

  const onSubmit = (e) => {
    e.preventDefault();
    if (!email) return;
    setSubmitted(true);
    setTimeout(() => setSubmitted(false), 2200);
    setEmail("");
  };

  return (
    <div className="relative min-h-screen bg-black overflow-hidden">
      {/* Background video — direct file <video> or Vimeo/YouTube iframe */}
      {(() => {
        const url = t.videoUrl || "";
        const isVimeo = /player\.vimeo\.com|vimeo\.com/i.test(url);
        const isYouTube = /youtube\.com|youtu\.be/i.test(url);

        let embedUrl = url;
        if (isVimeo) {
          const m = url.match(/(?:player\.vimeo\.com\/video\/|vimeo\.com\/)(\d+)/);
          const id = m && m[1];
          if (id) {
            embedUrl = `https://player.vimeo.com/video/${id}?background=1&autoplay=1&loop=1&muted=1&autopause=0`;
          }
        }

        if (isVimeo || isYouTube) {
          return (
            <div
              className="absolute inset-0 overflow-hidden pointer-events-none"
              style={{ filter: `brightness(${t.videoBrightness}%)` }}
            >
              <iframe
                key={embedUrl}
                src={embedUrl}
                frameBorder="0"
                allow="autoplay; fullscreen; picture-in-picture"
                title="Background video"
                style={{
                  position: "absolute",
                  top: "50%",
                  left: "50%",
                  width: "max(100vw, 177.78vh)",
                  height: "max(56.25vw, 100vh)",
                  transform: `translate(-50%, calc(-50% + ${t.videoYOffset}%))`,
                  border: 0,
                  pointerEvents: "none",
                }}
              />
            </div>
          );
        }

        return (
          <video
            ref={videoRef}
            key={url}
            className="absolute inset-0 w-full h-full object-cover"
            style={{
              opacity: 0,
              transform: `translateY(${t.videoYOffset}%)`,
              filter: `brightness(${t.videoBrightness}%)`,
            }}
            src={url}
            muted
            autoPlay

            preload="auto"
            crossOrigin="anonymous"
          />
        );
      })()}
      {/* Subtle vignette so glass + text stay legible regardless of video frame */}
      <div className="absolute inset-0 pointer-events-none"
           style={{ background: `radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,${t.vignette/100}) 100%)` }} />

      {/* Foreground column */}
      <div className="relative z-10 min-h-screen flex flex-col">
        {/* Nav */}
        <nav className="relative z-20 pl-6 pr-6 py-6">
          <div className="rounded-full px-6 py-3 flex items-center justify-between max-w-5xl mx-auto">
            <div className="flex items-center gap-8">
              <a href="#" className="flex items-center gap-2 text-white font-semibold text-lg">
                <Icon name="Globe" size={24} strokeWidth={1.75} />
                <span>Asme</span>
              </a>
              <div className="hidden md:flex items-center gap-8">
                {["Practices", "Programs", "About"].map((label) => (
                  <a
                    key={label}
                    href="#"
                    className="text-white/80 hover:text-white transition-colors text-sm font-medium"
                  >
                    {label}
                  </a>
                ))}
              </div>
            </div>
            <div className="flex items-center gap-4">
              <a href="#" className="text-white text-sm font-medium hover:text-white/90 transition-colors">
                Sign Up
              </a>
              <a
                href="#"
                className="liquid-glass rounded-full px-6 py-2 text-white text-sm font-medium"
              >
                Login
              </a>
            </div>
          </div>
        </nav>

        {/* Hero content */}
        <main className="relative z-10 flex-1 flex flex-col items-center justify-center px-6 py-12 text-center -translate-y-[20%]">
          <h1
            className="text-white mb-6 tracking-tight"
            style={{ fontFamily: "'Instrument Serif', serif", lineHeight: 1.05, fontSize: `clamp(2.5rem, ${5.5 * t.headingScale/100}vw, ${4.5 * t.headingScale/100}rem)` }}
          >
            {t.headlineLine1}<br/>{t.headlineLine2} <em className="italic">{t.headlineItalic}</em>
          </h1>

          <p className="max-w-xl text-white/75 text-base md:text-lg leading-relaxed mb-10 px-4"
             style={{ textWrap: "pretty" }}>
            {t.subline}
          </p>

          <div className="flex flex-col sm:flex-row items-center justify-center gap-3 mb-12">
            <a
              href="#start"
              className="bg-white text-black rounded-full px-7 py-3 text-sm font-medium hover:bg-white/90 active:scale-[0.98] transition-all inline-flex items-center gap-2"
            >
              {t.primaryCta}
              <Icon name="ArrowRight" size={16} strokeWidth={2} />
            </a>
            <a
              href="#practices"
              className="liquid-glass rounded-full px-7 py-3 text-white text-sm font-medium hover:bg-white/5 transition-colors"
            >
              {t.secondaryCta}
            </a>
          </div>

          <p className="max-w-xl text-white/55 text-sm leading-relaxed px-4 italic"
             style={{ fontFamily: "'Instrument Serif', serif", fontSize: '1.15rem' }}>
            {t.manifesto}
          </p>
        </main>

        {/* Social row — anchored at bottom of hero viewport */}
        {t.showSocials && (
          <div className="relative z-10 flex justify-center gap-4 pb-12">
            {[
              { name: "Instagram", label: "Instagram" },
              { name: "Twitter", label: "Twitter" },
              { name: "Globe", label: "Website" },
            ].map((item) => (
              <button
                key={item.name}
                type="button"
                aria-label={item.label}
                className="liquid-glass rounded-full p-4 text-white/80 hover:text-white hover:bg-white/5 transition-all"
              >
                <Icon name={item.name} size={20} strokeWidth={1.75} />
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Scroll cue */}
      <div className="absolute bottom-4 left-1/2 -translate-x-1/2 z-10 text-white/40 mono text-[10px] tracking-[0.3em] uppercase select-none">
        scroll
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  Reveal-on-scroll hook                                              */
/* ------------------------------------------------------------------ */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.15, rootMargin: "0px 0px -8% 0px" });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ------------------------------------------------------------------ */
/*  Section: Your Mental Wellbeing — fan-of-images + intro band        */
/* ------------------------------------------------------------------ */
function WhatIsMindfulnessIntro() {
  // Fan layout: 4 cards arranged on an arc. Tilt + Y-offset per index.
  const cards = [
    { rot: -18, ty:  28, label: "guidance" },
    { rot:  -6, ty:   4, label: "stretch"  },
    { rot:   6, ty:   4, label: "movement" },
    { rot:  18, ty:  28, label: "rest"     },
  ];

  // Scroll-driven fan progress: 0 = stacked, 1 = fully fanned out.
  const stageRef = useRef(null);
  const [progress, setProgress] = useState(0);

  useEffect(() => {
    const onScroll = () => {
      const el = stageRef.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const vh = window.innerHeight || 1;
      // Start expanding when the stage is ~85% into view; finish when its center hits viewport center.
      const start = vh * 0.85;
      const end = vh * 0.25;
      const cur = rect.top;
      let p = (start - cur) / (start - end);
      if (p < 0) p = 0;
      if (p > 1) p = 1;
      setProgress(p);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("resize", onScroll);
    };
  }, []);

  return (
    <section className="relative bg-black text-white overflow-hidden">
      {/* Top: title + subcopy + pill — same dark + serif language as the page */}
      <div className="relative px-6 md:px-10 lg:px-14 pt-28 md:pt-36 pb-8 md:pb-12 max-w-6xl mx-auto">
        <div className="grid md:grid-cols-12 gap-8 items-end">
          <div className="md:col-span-10 reveal">
            <h2
              className="tracking-tight"
              style={{
                fontFamily: "'Instrument Serif', serif",
                fontSize: "clamp(2.4rem, 5.5vw, 4.6rem)",
                lineHeight: 1.02,
              }}
            >
              Your mental <em className="italic text-white/70">wellbeing.</em>
            </h2>
            <p className="text-[15px] md:text-base leading-relaxed text-white/65 mt-6 max-w-md" style={{ textWrap: "pretty" }}>
              Asme provides care &amp; professional mindfulness support for your journey.
            </p>
          </div>
          <div className="md:col-span-2 flex md:justify-end reveal" style={{ transitionDelay: "180ms" }}>
            <a
              href="#"
              className="liquid-glass inline-flex items-center gap-2 rounded-full px-5 py-2.5 text-sm font-medium text-white hover:bg-white/5 transition-colors whitespace-nowrap"
            >
              <span>Who We Are</span>
              <Icon name="ArrowUpRight" size={14} strokeWidth={2} />
            </a>
          </div>
        </div>
      </div>

      {/* Bottom: plain black bg — matches the rest of the page — hosting the fan */}
      <div ref={stageRef} className="relative h-[64vh] md:h-[72vh] min-h-[480px] flex items-center justify-center overflow-hidden bg-black py-16 md:py-20">
        <div className="relative w-full max-w-5xl flex items-center justify-center h-full">
          <div className="relative flex items-end justify-center" style={{ width: 0 }}>
            {cards.map((c, i) => {
              const mid = (cards.length - 1) / 2; // 2
              const offset = i - mid; // -2..2
              // At progress 0 → all cards stacked at center (no rot, no x, no y, slight scale-down)
              // At progress 1 → full fan: rot, ty, and horizontal spread
              const spreadPx = 180; // horizontal gap between fanned cards
              const rot = c.rot * progress;
              const ty = c.ty * progress;
              const tx = offset * spreadPx * progress;
              const scale = 0.92 + 0.08 * progress;
              return (
                <div
                  key={i}
                  className="absolute"
                  style={{
                    top: "50%",
                    left: "50%",
                    transform: `translate(calc(-50% + ${tx}px), -50%) rotate(${rot}deg) translateY(${ty}px) scale(${scale})`,
                    transformOrigin: "center center",
                    transition: "transform 120ms linear",
                    zIndex: 10 - Math.abs(offset),
                  }}
                >
                  <div className="placeholder-stripes liquid-glass rounded-[22px] w-[155px] h-[220px] md:w-[205px] md:h-[286px] overflow-hidden flex items-end p-3 relative">
                    <div className="absolute inset-0 pointer-events-none"
                         style={{ background: "linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 30%, rgba(0,0,0,0.45) 100%)" }} />
                    <span className="mono text-[9px] tracking-[0.25em] uppercase text-white/55 relative">
                      [ {c.label} ]
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ------------------------------------------------------------------ */
/*  Section: What is Mindfulness?                                      */
/* ------------------------------------------------------------------ */
function WhatIsMindfulness() {
  const benefits = [
    { kicker: "01", text: "Reduce stress and anxiety" },
    { kicker: "02", text: "Improve focus and clarity" },
    { kicker: "03", text: "Regulate emotions" },
    { kicker: "04", text: "Increase self-awareness" },
    { kicker: "05", text: "Support overall well-being" },
  ];

  const listRef = useRef(null);
  const [progress, setProgress] = useState(0);
  const [active, setActive] = useState(0);

  useEffect(() => {
    const el = listRef.current;
    if (!el) return;
    const onScroll = () => {
      const max = el.scrollHeight - el.clientHeight;
      const p = max > 0 ? el.scrollTop / max : 0;
      setProgress(p);
      // active item ~= rounded fraction across the list
      const idx = Math.min(benefits.length - 1, Math.round(p * (benefits.length - 1)));
      setActive(idx);
    };
    el.addEventListener("scroll", onScroll);
    return () => el.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <section className="relative bg-black text-white overflow-hidden">
      {/* Full-bleed Vimeo background */}
      <div className="absolute inset-0 overflow-hidden pointer-events-none">
        <iframe
          src="https://player.vimeo.com/video/1189981564?background=1&autoplay=1&loop=1&muted=1&autopause=0"
          frameBorder="0"
          allow="autoplay; fullscreen; picture-in-picture"
          title="Mindfulness background"
          style={{
            position: "absolute",
            top: "50%",
            left: "50%",
            width: "max(100vw, 177.78vh)",
            height: "max(56.25vw, 100vh)",
            transform: "translate(-50%, -50%)",
            border: 0,
            pointerEvents: "none",
          }}
        />
        {/* Tint for legibility */}
        <div className="absolute inset-0"
             style={{ background: "linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.25) 35%, rgba(0,0,0,0.55) 100%)" }} />
      </div>

      {/* Edge gradients — fade so adjacent video sections blend smoothly */}
      <div className="absolute top-0 left-0 right-0 h-40 pointer-events-none z-[1]"
           style={{ background: "linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, transparent 100%)" }} />
      <div className="absolute bottom-0 left-0 right-0 h-40 pointer-events-none z-[1]"
           style={{ background: "linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, transparent 100%)" }} />

      <div className="relative px-6 md:px-10 lg:px-14 pt-28 md:pt-36 pb-12 md:pb-16 min-h-[100vh] flex flex-col justify-between max-w-[1400px] mx-auto">
        {/* Top: kicker + headline + CTA */}
        <div className="reveal max-w-3xl">
          <div className="text-white/85 text-sm md:text-base mb-6 font-medium">
            More Than Meditation
          </div>
          <h2
            className="text-white tracking-tight mb-10"
            style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(2.6rem, 6vw, 5.5rem)", lineHeight: 1.0 }}
          >
            Where presence<br/>meets <em className="italic">practice.</em>
          </h2>
          <a
            href="#start"
            className="inline-flex items-center gap-3 bg-white text-black rounded-full pl-6 pr-2 py-2 text-sm font-medium hover:bg-white/90 active:scale-[0.98] transition-all"
          >
            <span>Start Doing Today</span>
            <span className="bg-black text-white rounded-full p-2 flex items-center justify-center">
              <Icon name="ArrowRight" size={14} strokeWidth={2} />
            </span>
          </a>
        </div>

        {/* Bottom: floating glass cards */}
        <div className="grid md:grid-cols-2 gap-4 md:gap-5 mt-16 md:mt-24">
          {/* Card 1 — intro / what is mindfulness */}
          <div className="liquid-glass rounded-3xl p-6 md:p-7 reveal">
            <div className="mono text-[10px] tracking-[0.3em] uppercase text-white/50 mb-4">

              The practice of paying attention to the present moment, without judgment — a skill you can train to reduce stress, improve focus, and cultivate emotional well-being.
            </p>
            <p className="text-white/65 text-sm leading-relaxed italic"
               style={{ fontFamily: "'Instrument Serif', serif", fontSize: "1.05rem" }}>
              No experience needed—just a willingness to pause, breathe, and notice.
            </p>

/* Pill tags that rain in from above when the row enters view, and gently
   wobble on hover. The reveal hook is unused here \u2014 each pill listens via its
   own IntersectionObserver so the rain only triggers once. */
function PillRain() {
  const containerRef = useRef(null);
  const [shown, setShown] = useState(false);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          setShown(true);
          io.disconnect();
        }
      });
    }, { threshold: 0.4 });
    io.observe(el);
    return () => io.disconnect();
  }, []);

  // Each pill: label + fixed pseudo-random position/rotation so the layout
  // looks scattered but stable across renders.
  const pills = [
    { label: "Intentional Movement", x: -34, y:  10, rot: -8,  delay:   0 },
    { label: "Purposeful Breathing", x:   2, y: -10, rot:  4,  delay: 120 },
    { label: "Empowered Strength",   x: -10, y:  40, rot: -2,  delay: 240 },
    { label: "Inner Harmony",        x:  28, y:  22, rot:  6,  delay: 360 },
    { label: "Quiet Mind",           x:  34, y: -18, rot: 10,  delay: 480 },
    { label: "Daily Stillness",      x: -30, y: -22, rot: -10, delay: 600 },
  ];

  return (
    <div
      ref={containerRef}
      className="relative mt-16 mx-auto"
      style={{ width: "min(100%, 720px)", height: "260px" }}
    >
      {pills.map((p, i) => (
        <span
          key={p.label}
          className="pill-tag liquid-glass"
          style={{
            position: "absolute",
            left: `calc(50% + ${p.x}%)`,
            top: `calc(50% + ${p.y}px)`,
            transform: shown
              ? `translate(-50%, -50%) rotate(${p.rot}deg)`
              : `translate(-50%, calc(-50% - 60vh)) rotate(${p.rot * 2}deg)`,
            opacity: shown ? 1 : 0,
            transition: `transform 1100ms cubic-bezier(.22,1.2,.36,1) ${p.delay}ms, opacity 600ms ease ${p.delay}ms`,
          }}
        >
          <span className="pill-dot" aria-hidden="true">
            <Icon name="Check" size={10} strokeWidth={2.5} />
          </span>
          <span className="whitespace-nowrap">{p.label}</span>
        </span>
      ))}
      <style>{`
        .pill-tag {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 10px 16px 10px 10px;
          border-radius: 999px;
          color: #fff;
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 0.005em;
          will-change: transform;
          cursor: default;
        }
        .pill-tag:hover {
          animation: pill-wobble 600ms ease;
        }
        .pill-dot {
          width: 18px; height: 18px;
          border-radius: 999px;
          background: rgba(255,255,255,0.18);
          display: inline-flex; align-items: center; justify-content: center;
          color: rgba(255,255,255,0.95);
        }
        @keyframes pill-wobble {
          0%   { transform: translate(-50%, -50%) rotate(var(--r,0deg)) translateY(0); }
          25%  { transform: translate(-50%, -50%) rotate(calc(var(--r,0deg) - 4deg)) translateY(-4px); }
          50%  { transform: translate(-50%, -50%) rotate(calc(var(--r,0deg) + 3deg)) translateY(-2px); }
          75%  { transform: translate(-50%, -50%) rotate(calc(var(--r,0deg) - 2deg)) translateY(-3px); }
          100% { transform: translate(-50%, -50%) rotate(var(--r,0deg)) translateY(0); }
        }
      `}</style>
    </div>
  );
}
